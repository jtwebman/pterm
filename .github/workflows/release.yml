name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install packaging tools
        run: sudo apt-get update && sudo apt-get install -y rpm libarchive-tools

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules for Electron
        run: npx electron-builder install-app-deps

      - name: Build and package
        run: npm run dist:linux

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: |
            release/*.deb
            release/*.rpm
            release/*.pacman
            release/*.AppImage
          retention-days: 5

  build-mac-arm64:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules for Electron
        run: npx electron-builder install-app-deps

      - name: Build and package
        run: npm run build && npx electron-builder --mac --arm64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-mac-arm64
          path: release/*.dmg
          retention-days: 5

  build-mac-x64:
    runs-on: macos-13

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules for Electron
        run: npx electron-builder install-app-deps

      - name: Build and package
        run: npm run build && npx electron-builder --mac --x64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-mac-x64
          path: release/*.dmg
          retention-days: 5

  publish:
    needs: [build-linux, build-mac-arm64, build-mac-x64]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: release-*

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            artifacts/**/*
