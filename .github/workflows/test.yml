name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npx vp fmt --check src/

      - name: Lint and typecheck
        run: npx vp lint src/

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npx vp test run src/

  e2e:
    needs: check
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules for Electron
        run: npx electron-builder install-app-deps

      - name: Build
        run: npm run build

      # Linux needs a virtual framebuffer for Electron's GUI
      - name: Run e2e tests (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum npx playwright test
        env:
          CI: true

      - name: Run e2e tests (macOS)
        if: runner.os == 'macOS'
        run: npx playwright test
        env:
          CI: true

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-${{ matrix.os }}
          path: test-results/
          retention-days: 7
