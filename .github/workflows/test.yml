name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      # node-pty needs native compilation — electron-builder install-app-deps
      # runs via postinstall, but we also need to ensure electron is extracted
      - name: Rebuild native modules for Electron
        run: npx electron-builder install-app-deps

      - name: Build
        run: npm run build

      # Linux needs a virtual framebuffer for Electron's GUI
      - name: Run tests (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum npx playwright test
        env:
          CI: true

      - name: Run tests (macOS / Windows)
        if: runner.os != 'Linux'
        run: npx playwright test
        env:
          CI: true

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-${{ matrix.os }}
          path: test-results/
          retention-days: 7
